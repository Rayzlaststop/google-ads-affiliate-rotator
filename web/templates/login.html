<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>登录 - 联盟参数管理</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: system-ui, sans-serif; background: #f5f5f5; display: flex; align-items: center; justify-content: center; min-height: 100vh; }
  .card { background: #fff; border-radius: 8px; padding: 32px; width: 320px; box-shadow: 0 1px 3px rgba(0,0,0,.1); }
  h1 { font-size: 1.2rem; margin-bottom: 20px; color: #333; }
  input { width: 100%; padding: 9px 12px; border: 1px solid #ddd; border-radius: 6px; font-size: .9rem; margin-bottom: 12px; }
  input:focus { outline: none; border-color: #42a5f5; }
  button { width: 100%; background: #1976d2; color: #fff; border: none; padding: 10px; border-radius: 6px; cursor: pointer; font-size: .9rem; }
  button:hover { background: #1565c0; }
  .error { color: #e53935; font-size: .85rem; margin-bottom: 12px; }
</style>
</head>
<body>
<div class="card">
  <h1>联盟参数管理</h1>
  {% if error %}<p class="error">{{ error }}</p>{% endif %}
  <form method="post">
    <input type="password" name="password" placeholder="请输入密码" autofocus required>
    <button type="submit">登录</button>
  </form>
</div>
</body>
</html>
